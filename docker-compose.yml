# ==================================================================
# Enterprise Analytics Platform — full local stack
#   docker compose up -d --build
# Services: postgres, api, streamlit, airflow, mlflow
# ==================================================================
name: enterprise-analytics-platform

x-common-env: &common-env
  EAP_ENV: docker
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-olist}
  POSTGRES_USER: ${POSTGRES_USER:-analytics}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics}

services:
  postgres:
    image: postgres:16-alpine
    container_name: eap-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-olist}
      POSTGRES_USER: ${POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analytics} -d ${POSTGRES_DB:-olist}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [eap-net]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: eap-api
    environment:
      <<: *common-env
      API_PORT: 8000
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [eap-net]

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: eap-streamlit
    environment:
      <<: *common-env
      EAP_API_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [eap-net]

  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: eap-airflow
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-analytics}:${POSTGRES_PASSWORD:-analytics}@postgres:5432/${POSTGRES_DB:-olist}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    ports:
      - "${AIRFLOW_HOST_PORT:-8080}:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks: [eap-net]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: eap-mlflow
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns
      --default-artifact-root /mlartifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns
      - mlflow-artifacts:/mlartifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks: [eap-net]

volumes:
  pgdata:
  airflow-logs:
  mlflow-data:
  mlflow-artifacts:

networks:
  eap-net:
    driver: bridge
