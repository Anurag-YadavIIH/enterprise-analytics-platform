# =====================================================================
# CI: lint (ruff + black + mypy) and test (pytest) on every push/PR.
# =====================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tooling
        run: pip install ruff black mypy pydantic pydantic-settings types-requests

      - name: Ruff
        run: ruff check src tests

      - name: Black
        run: black --check src tests

      - name: Mypy
        run: mypy src

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev extras
        run: |
          pip install -e ".[api,dev]"

      - name: Run tests with coverage
        run: pytest --cov=eap --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  dbt-compile:
    name: dbt parse check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dbt-duckdb
        run: pip install dbt-duckdb

      - name: dbt parse
        working-directory: dbt/olist
        env:
          DBT_PROFILES_DIR: .
        run: dbt parse
