name: olist
version: "1.0.0"
config-version: 2
profile: olist

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages", "logs"]

vars:
  # Path to the processed Parquet directory (overridable at run time).
  processed_dir: "../../data/processed"

models:
  olist:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      core:
        +schema: core
      finance:
        +schema: finance
      marketing:
        +schema: marketing

seeds:
  olist:
    +schema: seeds
